version: 2

project_name: peek

before:
  hooks:
    - go mod tidy
    - npm --prefix web ci
    - npm --prefix web run build

builds:
  - main: ./cmd/peek
    binary: peek
    ldflags:
      - -s -w
      - -X github.com/bskyn/peek/internal/cli.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: bskyn
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/bskyn/peek"
    description: "Observe AI agent sessions in real-time"
    license: MIT
    install: |
      bin.install "peek"
